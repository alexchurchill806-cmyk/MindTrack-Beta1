<!-- Jason Rodriguez -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event & Habit Planner</title>
  <link rel="stylesheet" href="css/Event&habit.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>

<main>

  <h2 id="EventTitle" class="Title">Add Event</h2>
  <h2 id="HabitTitle" class="Title">Add Habit</h2>

  <form>

    <div class="ToggleOptions">

      <input type="radio" id="eventOption" name="entryType" value="event" checked>
      <label for="eventOption">Event</label>

      <input type="radio" id="habitOption" name="entryType" value="habit">
      <label for="habitOption">Habit</label>

    </div>

    <div class="EventInput">

      <br>

      <label for="EventName">Event Name</label><br><br>
      <input type="text" id="EventName" name="eventName" required>

      <br><br>

      <label for="EventDate">Date</label><br><br>
      <input type="date" id="EventDate" name="eventDate" required>

      <br>

      <div class="Category">

      <p>Category</p>
        
      <input type="radio" id="Assignments" name="eventCategory" value="Assignment" checked>
      <label for="Assignments">Assignment</label>

      <input type="radio" id="Exams" name="eventCategory" value="Exam">
      <label for="Exams">Exam</label>

      <input type="radio" id="Personal" name="eventCategory" value="Personal">
      <label for="Personal">Personal</label>

      <input type="radio" id="Other" name="eventCategory" value="Other">
      <label for="Other">Other</label>

      </div>

      <br>

      <div class="Timelabel">
        <label>Time</label>
        <br><br>
        <input type="time" id="EventStartTime" name="startTime" required>
        <span class="TimeDash">to</span>
        <input type="time" id="EventEndTime" name="endTime" required>
      </div>

    <div class="ColorOptions">
      <p>Choose a color:</p>

      <label>
        <input type="radio" name="eventColor" value="blue" class="Blue " checked>
        <span class="custom-circle"></span>
      </label>

      <label>
        <input type="radio" name="eventColor" value="green" class="Green">
        <span class="custom-circle"></span>
      </label>

      <label>
        <input type="radio" name="eventColor" value="red" class="Red">
        <span class="custom-circle"></span>
      </label>

      <label>
        <input type="radio" name="eventColor" value="purple" class="Purple">
        <span class="custom-circle"></span>
      </label>

      <label>
        <input type="radio" name="eventColor" value="orange" class="Orange">
        <span class="custom-circle"></span>
      </label>
    </div>

      <br>

      <label for="EventDescription">Description</label><br><br>
      <textarea type="text" id="EventDescription" name="eventDescription" placeholder="Notes about the event..." rows="4" cols="50"></textarea>

      <br><br>

      <div class="FileUpload">
        <p>Drag & Drop PDF here or Click to Upload</p>
        <input type="file" id="FileInput" name="uploadedFile" accept=".pdf">
      </div>

      <br><br>
      <div class="SaveCancelEvent">
        <button type="button">Cancel</button>
        <button type="submit" name="saveEvent">Save Event</button>
      </div>
    </div>

    <div class="HabitInput">

      <br>

      <label for="HabitName">Habit Name</label><br><br>
      <input type="text" id="HabitName" name="habitName" required>
      <br><br>

      <label for="HabitDate">Date</label><br><br>
      <input type="date" id="HabitDate" name="habitDate" required>

      <div class="Category">

        <p>Category</p>

        <input type="radio" id="health" name="habitCategory" value="health" checked>
        <label for="health">Health</label>

        <input type="radio" id="productivity" name="habitCategory" value="productivity">
        <label for="productivity">Productivity</label>

        <input type="radio" id="hobby" name="habitCategory" value="hobby">
        <label for="hobby">Hobby</label>

        <input type="radio" id="learning" name="habitCategory" value="learning">
        <label for="learning">Learning</label>

        <input type="radio" id="lifestyle" name="habitCategory" value="lifestyle">
        <label for="lifestyle">Lifestyle</label>

        <input type="radio" id="other" name="habitCategory" value="other">
        <label for="other">Other</label>

      </div>

      <br>

      <div class="Timelabel">
        <label>Time</label><br><br>

        <input type="time" id="HabitStartTime" name="startTime" required>
        <span class="TimeDash">to</span>
        <input type="time" id="HabitEndTime" name="endTime" required>
      </div>

      <div class="frequencyOptions">
        <p>Frequency</p>

        <input type="radio" id="daily" name="habitFrequency" value="daily" checked>
        <label for="daily">Daily</label>

        <input type="radio" id="weekly" name="habitFrequency" value="weekly">
        <label for="weekly"> Weekly</label>

        <input type="radio" id="monthly" name="habitFrequency" value="monthly">
        <label for="monthly"> Monthly</label>

      </div>

      <br>

      <div class="Days">
        <p>Days</p>

        <input type="checkbox" id="Monday" name="habitDays" value="Monday">
        <label for="Monday">Monday</label>

        <input type="checkbox" id="Tuesday" name="habitDays" value="Tuesday">
        <label for="Tuesday">Tuesday</label>

        <input type="checkbox" id="Wednesday" name="habitDays" value="Wednesday">
        <label for="Wednesday">Wednesday</label>

        <input type="checkbox" id="Thursday" name="habitDays" value="Thursday">
        <label for="Thursday">Thursday</label>

        <input type="checkbox" id="Friday" name="habitDays" value="Friday">
        <label for="Friday">Friday</label>

        <input type="checkbox" id="Saturday" name="habitDays" value="Saturday">
        <label for="Saturday">Saturday</label>

        <input type="checkbox" id="Sunday" name="habitDays" value="Sunday">
        <label for="Sunday">Sunday</label>
      </div>

      <div class="weeklyoptions">
        <label for="WeeklyDate">Select Day of the Week</label><br><br>
        <select id="WeeklyDate" name="weeklyDate">
          <option value="Monday">Monday</option>
          <option value="Tuesday">Tuesday</option>
          <option value="Wednesday">Wednesday</option>
          <option value="Thursday">Thursday</option>
          <option value="Friday">Friday</option>
          <option value="Saturday">Saturday</option>
          <option value="Sunday">Sunday</option>
        </select>
      </div>


      <div class="Monthly-date">

        <label for="EventDate">Date</label><br><br>
        <input type="date" id="EventDate" name="eventDate" required>

      </div>
      <br>

      <label for="TargetGoal">Target Goal</label><br><br>
      <input type="text" id="TargetGoal" name="habitGoal" placeholder="Ex: Read 10 minutes" required>

      <br><br>

      <label for="HabitDescription">Description</label><br><br>
      <textarea type="text" id="HabitDescription" name="habitDescription" rows="4" cols="50" placeholder="Notes about the habit..."></textarea>

      <br><br>
      <div class="SaveCancelHabit">
        <button type="button">Cancel</button>
        <button type="submit" name="saveHabit">Save Habit</button>
      </div>

    </div>
  </form>
</main>

<div id="pdfViewer">
  <h2>Uploaded PDF</h2>
  <embed id="pdfEmbed" type="application/pdf" width="100%" height="600px" />
</div>

<script src="js/EventAndHabit.js"></script>

</body>
</html>
