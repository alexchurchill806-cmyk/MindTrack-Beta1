<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New Habit</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <main class="habit-card" aria-label="Add New Habit Form">
      <img class="card-bg" src="images/rectangle7.png" alt="Decorative background"> 
      <h1>Add New Habit</h1>

      <div class="toggle-group" role="group" aria-label="Choose event or habit">
        <button type="button" class="toggle-btn" data-choice="event">
          <img src="images/event-option.png" alt="Event option" class="toggle-icon">
          Event
        </button>
        <button type="button" class="toggle-btn active" data-choice="habit">
          <img src="images/habit-option.png" alt="Habit option" class="toggle-icon">
          Habit
        </button>
      </div>

      <div class="field">
        <label for="habitName">Habit Name</label>
        <input id="habitName" type="text" placeholder="Enter habit name">
      </div>

      <div class="field date-field">
        <label for="habitDate">Date</label>
        <div class="input-with-icon">
          <img src="images/icon.png" alt="Calendar icon" class="field-icon">
          <input id="habitDate" type="date" aria-label="Pick a date">
        </div>
      </div>

      <div class="field">
        <label>Category</label>
        <div class="category-grid" role="group" aria-label="Category options">
          <button type="button" class="category-pill active">Health</button>
          <button type="button" class="category-pill">Productivity</button>
          <button type="button" class="category-pill">Learning</button>
          <button type="button" class="category-pill">Lifestyle</button>
        </div>
        <button type="button" class="category-wide">Other</button>
      </div>

      <div class="field time-field">
        <label for="habitTime">Time</label>
        <input id="habitTime" type="text" placeholder="Select time" readonly>
      </div>

      <div class="field frequency-field">
        <label>Frequency</label>
        <div class="frequency-grid" role="group" aria-label="Frequency options">
          <button type="button" class="frequency-pill active">Daily</button>
          <button type="button" class="frequency-pill">Weekly</button>
          <button type="button" class="frequency-pill">Monthly</button>
        </div>
      </div>

      <div class="field">
        <label for="habitDescription">Description</label>
        <textarea id="habitDescription" rows="4" placeholder="Notes about the event..."></textarea>
      </div>

      <div class="upload-field">
        <input id="fileUpload" type="file" accept=".pdf,.png,.jpg,.jpeg,.gif,.docx" hidden>
        <div id="uploadZone" class="upload-zone" tabindex="0" aria-label="Drag and drop files or click to upload">
          <div class="upload-content">
            <p class="upload-title">Drag & Drop file here</p>
            <p class="upload-subtitle">or Click to Upload</p>
          </div>
        </div>
        <p class="upload-help">Supported: PDF, Image, Screenshot, DOCX</p>
      </div>

      <div class="actions">
        <button type="button" class="secondary-btn" id="cancelButton">Cancel</button>
        <button type="button" class="primary-btn" id="saveButton">Save Event</button>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
