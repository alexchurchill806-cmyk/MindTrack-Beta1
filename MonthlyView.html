<br>  

<details class="Month-glance" open>
    <summary>Month At A Glance</summary>

    <label for="Timeframe">Select Timeframe:</label>
    <select id="Timeframe" name="Timeframe">
        <option value="">-- Choose One --</option>
        <option value="1m"> 1m </option>
        <option value="6m"> 6m </option>
        <option value="12m"> 12m </option>
    </select>
        <p>Progress: 27 / 36 habits completed</p>
        <div style="width:100px; height:100px; border:5px solid #0d6efd; border-radius:50%; text-align:center; line-height:100px;">
            27/36
        </div>
</details>

<br>

<details class="Day-focus" open>
    <summary>Day Focus</summary>

    <p>Study</p>
    <div style="width:70%; height:10px; background-color:#0d6efd;"></div>

    <p>Workout</p>
    <div style="width:30%; height:10px; background-color:#0d6efd;"></div>

    <p>Sleep</p>

    <p>Eat</p>
