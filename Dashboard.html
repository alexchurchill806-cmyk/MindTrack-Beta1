<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>MindTrack</title>
	<link rel="stylesheet" href="css/styles.css">
</head>

<body>


	<header>
		<nav class="main-nav" aria-label="Main navigation">
			<div style="display:flex;align-items:center;gap:0.6rem;">
				<img src="images/IMG_2054.png" alt="MindTrack logo" class="nav-logo">
				<h1>MindTrack</h1>
			</div>
			<ul>
				<li><a href="Dashboard.html" class="current-page" aria-current="page">Home</a></li>
				<li><a href="WeeklyView.html">Weekly</a></li>
				<li><a href="MonthlyView.html">Monthly</a></li>
				<li><a href="Habit&Event.html">Habits & Events</a></li>
			</ul>
		</nav>
	</header>

	<main class="dashboard-container">
		<section>
			<h2>Today's Dashboard</h2>

			<button class="add-event-btn" aria-label="Add event" onclick="window.location.href='Habit&amp;Event.html'">+ Add Event</button>

			<h3>Timeline</h3>
			<ul>
				<li>8AM - Event</li>
				<li>12PM - Lunch</li>
			</ul>


			<details class="habit-details" open>
				<summary>Habit Checklist</summary>
				<form class="habit-checkbox-group">
					<ul>
						<li>
							<label>
								<input type="checkbox" name="habit1" value="habit1">
								Habit 1
							</label>
						</li>
						<li>
							<label>
								<input type="checkbox" name="habit2" value="habit2">
								Habit 2
							</label>
						</li>
						<li>
							<label>
								<input type="checkbox" name="habit3" value="habit3">
								Habit 3
							</label>
						</li>
					</ul>
				</form>
			</details>

			<h3>Progress</h3>
			<div class="dashboard-progress" aria-live="polite">
				<div class="progress-circle" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Habit completion progress">
					<svg viewBox="0 0 120 120" aria-hidden="true">
						<circle class="progress-circle-track" cx="60" cy="60" r="52"></circle>
						<circle class="progress-circle-fill" cx="60" cy="60" r="52"></circle>
					</svg>
					<span class="progress-circle-value">0%</span>
				</div>
				<p class="progress-circle-caption">Habits completed today</p>
			</div>
		</section>
	</main>

	<script src="js/Dashboard.js"></script>
</body>
</html>
